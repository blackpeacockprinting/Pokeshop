<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BPP Product Admin</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#111;color:#eee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
  .screen{display:none;min-height:100vh;}
  .screen.active{display:flex;flex-direction:column;}

  /* PIN screen */
  .pin-screen{align-items:center;justify-content:center;padding:2rem;}
  .pin-logo{font-size:22px;font-weight:700;color:#b8960c;letter-spacing:1px;margin-bottom:2rem;text-align:center;}
  .pin-dots{display:flex;gap:16px;margin-bottom:2rem;}
  .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #555;transition:background 0.15s;}
  .pin-dot.filled{background:#b8960c;border-color:#b8960c;}
  .pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:280px;}
  .pin-btn{background:#1e1e1e;border:1px solid #333;color:#eee;font-size:22px;padding:18px;border-radius:12px;cursor:pointer;transition:background 0.1s;}
  .pin-btn:active{background:#2a2a2a;}
  .pin-err{color:#e05050;font-size:13px;margin-top:1rem;text-align:center;min-height:20px;}

  /* Main screen */
  .main-screen{padding:0;}
  .header{background:#1a1a1a;border-bottom:1px solid #2a2a2a;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
  .header-title{font-size:16px;font-weight:600;color:#b8960c;}
  .header-sub{font-size:11px;color:#666;margin-top:2px;}
  .logout-btn{background:none;border:1px solid #333;color:#888;font-size:12px;padding:6px 12px;border-radius:8px;cursor:pointer;}

  .content{padding:20px;flex:1;overflow-y:auto;}

  /* Product list */
  .section-title{font-size:13px;font-weight:600;color:#b8960c;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;}
  .product-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
  .product-item{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px;}
  .product-thumb{width:52px;height:52px;border-radius:8px;object-fit:cover;background:#222;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#555;font-size:10px;text-align:center;}
  .product-thumb img{width:52px;height:52px;border-radius:8px;object-fit:cover;}
  .product-info{flex:1;min-width:0;}
  .product-name{font-size:14px;font-weight:500;color:#eee;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .product-meta{font-size:12px;color:#888;margin-top:2px;}
  .product-actions{display:flex;gap:8px;flex-shrink:0;}
  .edit-btn{background:#1e2a1e;border:1px solid #2a4a2a;color:#4ab84a;font-size:12px;padding:6px 10px;border-radius:8px;cursor:pointer;}
  .del-btn{background:#2a1e1e;border:1px solid #4a2a2a;color:#e05050;font-size:12px;padding:6px 10px;border-radius:8px;cursor:pointer;}

  .add-new-btn{width:100%;background:#b8960c;border:none;color:#111;font-size:15px;font-weight:600;padding:16px;border-radius:12px;cursor:pointer;margin-bottom:24px;}
  .add-new-btn:active{background:#a07800;}

  /* Form */
  .form-screen{padding:0;}
  .form-header{background:#1a1a1a;border-bottom:1px solid #2a2a2a;padding:16px 20px;display:flex;align-items:center;gap:12px;}
  .back-btn{background:none;border:none;color:#b8960c;font-size:15px;cursor:pointer;padding:4px;}
  .form-title{font-size:16px;font-weight:600;color:#eee;}
  .form-body{padding:20px;flex:1;overflow-y:auto;}
  .fg{margin-bottom:16px;}
  .flabel{display:block;font-size:12px;color:#888;margin-bottom:6px;font-weight:500;}
  .finput,.fselect{width:100%;background:#1a1a1a;border:1px solid #333;color:#eee;font-size:15px;padding:12px 14px;border-radius:10px;outline:none;}
  .finput:focus,.fselect:focus{border-color:#b8960c;}
  .fselect option{background:#1a1a1a;}

  /* Photo upload */
  .photo-upload{width:100%;height:180px;background:#1a1a1a;border:2px dashed #333;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;}
  .photo-upload:active{border-color:#b8960c;}
  .photo-upload input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .photo-upload-icon{font-size:32px;color:#555;margin-bottom:8px;}
  .photo-upload-text{font-size:13px;color:#666;}
  .photo-preview{width:100%;height:180px;object-fit:contain;border-radius:12px;background:#1a1a1a;}
  .photo-status{font-size:12px;margin-top:6px;min-height:18px;}
  .photo-status.uploading{color:#b8960c;}
  .photo-status.done{color:#4ab84a;}
  .photo-status.err{color:#e05050;}

  .submit-btn{width:100%;background:#b8960c;border:none;color:#111;font-size:15px;font-weight:600;padding:16px;border-radius:12px;cursor:pointer;margin-top:8px;}
  .submit-btn:disabled{background:#555;color:#888;cursor:not-allowed;}
  .submit-btn:active:not(:disabled){background:#a07800;}

  .status-bar{background:#1e2a1e;border:1px solid #2a4a2a;color:#4ab84a;font-size:13px;padding:12px 14px;border-radius:10px;margin-top:12px;display:none;}
  .status-bar.err{background:#2a1e1e;border-color:#4a2a2a;color:#e05050;}
  .status-bar.show{display:block;}

  .cat-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:6px;font-weight:500;}
</style>
</head>
<body>

<!-- PIN Screen -->
<div class="screen pin-screen active" id="screen-pin">
  <div class="pin-logo">⬛ BPP Admin</div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="dot0"></div>
    <div class="pin-dot" id="dot1"></div>
    <div class="pin-dot" id="dot2"></div>
    <div class="pin-dot" id="dot3"></div>
  </div>
  <div class="pin-grid">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn" onclick="pinClear()" style="font-size:14px;">CLR</button>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn" onclick="pinBack()" style="font-size:14px;">⌫</button>
  </div>
  <div class="pin-err" id="pin-err"></div>
</div>

<!-- Main Screen -->
<div class="screen main-screen" id="screen-main">
  <div class="header">
    <div>
      <div class="header-title">Product Admin</div>
      <div class="header-sub">Black Peacock Printing</div>
    </div>
    <button class="logout-btn" onclick="logout()">Lock</button>
  </div>
  <div class="content">
    <button class="add-new-btn" onclick="openForm(null)">+ Add New Product</button>
    <div class="section-title">Custom Products</div>
    <div class="product-list" id="product-list">
      <div style="color:#666;font-size:13px;text-align:center;padding:20px;">Loading...</div>
    </div>
  </div>
</div>

<!-- Form Screen -->
<div class="screen form-screen" id="screen-form">
  <div class="form-header">
    <button class="back-btn" onclick="closeForm()">← Back</button>
    <div class="form-title" id="form-title">Add Product</div>
  </div>
  <div class="form-body">
    <div class="fg">
      <label class="flabel">Product Name</label>
      <input class="finput" id="f-name" type="text" placeholder="e.g. Master Ball Slab Stand">
    </div>
    <div class="fg">
      <label class="flabel">Slug (unique ID, no spaces)</label>
      <input class="finput" id="f-slug" type="text" placeholder="e.g. slab-stand-masterball">
    </div>
    <div class="fg">
      <label class="flabel">Category</label>
      <select class="fselect" id="f-category">
        <option value="slab-stand">Slab Stand</option>
        <option value="magnet">Magnet</option>
        <option value="accessory">Accessory</option>
      </select>
    </div>
    <div class="fg">
      <label class="flabel">Price (USD)</label>
      <input class="finput" id="f-price" type="number" step="0.01" placeholder="e.g. 15">
    </div>
    <div class="fg">
      <label class="flabel">Description</label>
      <input class="finput" id="f-desc" type="text" placeholder="Short product description">
    </div>
    <div class="fg">
      <label class="flabel">Product Photo</label>
      <div class="photo-upload" id="photo-upload-area">
        <input type="file" accept="image/*" id="photo-input" onchange="handlePhotoSelect(this)">
        <div class="photo-upload-icon" id="upload-icon">📷</div>
        <div class="photo-upload-text" id="upload-text">Tap to select photo</div>
      </div>
      <img class="photo-preview" id="photo-preview" style="display:none;">
      <div class="photo-status" id="photo-status"></div>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="saveProduct()">Save Product</button>
    <div class="status-bar" id="status-bar"></div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
var PIN = '9559';
var GITHUB_OWNER = 'blackpeacockprinting';
var GITHUB_REPO = 'Pokeshop';
var GITHUB_FILE = 'custom-products.json';
var GITHUB_BRANCH = 'main';
// Get a GitHub PAT with repo scope and paste it here:
// https://github.com/settings/tokens/new  → select "repo" → generate → copy
var GITHUB_TOKEN = 'PASTE_YOUR_GITHUB_PAT_HERE';

// Firebase Storage config (from pokeprintadmin project)
var FIREBASE_STORAGE_BUCKET = 'pokeprintadmin.firebasestorage.app';
var FIREBASE_API_KEY = 'PASTE_YOUR_FIREBASE_API_KEY_HERE';
// ────────────────────────────────────────────────────────────────────────────

var pinEntry = '';
var products = [];
var editingSlug = null;
var uploadedPhotoUrl = '';
var currentFileSHA = '';

// PIN
function pinPress(d) {
  if (pinEntry.length >= 4) return;
  pinEntry += d;
  updateDots();
  if (pinEntry.length === 4) checkPin();
}
function pinBack() { pinEntry = pinEntry.slice(0, -1); updateDots(); }
function pinClear() { pinEntry = ''; updateDots(); }
function updateDots() {
  for (var i = 0; i < 4; i++) {
    document.getElementById('dot' + i).className = 'pin-dot' + (i < pinEntry.length ? ' filled' : '');
  }
}
function checkPin() {
  if (pinEntry === PIN) {
    showScreen('main');
    loadProducts();
  } else {
    document.getElementById('pin-err').textContent = 'Incorrect PIN';
    pinEntry = '';
    updateDots();
    setTimeout(function() { document.getElementById('pin-err').textContent = ''; }, 1500);
  }
}
function logout() { showScreen('pin'); pinEntry = ''; updateDots(); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById('screen-' + id).classList.add('active');
}

// Load products from GitHub
function loadProducts() {
  document.getElementById('product-list').innerHTML = '<div style="color:#666;font-size:13px;text-align:center;padding:20px;">Loading...</div>';
  fetch('https://api.github.com/repos/' + GITHUB_OWNER + '/' + GITHUB_REPO + '/contents/' + GITHUB_FILE + '?ref=' + GITHUB_BRANCH, {
    headers: { 'Authorization': 'token ' + GITHUB_TOKEN, 'Accept': 'application/vnd.github.v3+json' }
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    currentFileSHA = data.sha;
    products = JSON.parse(atob(data.content.replace(/\n/g, '')));
    renderProductList();
  })
  .catch(function(e) {
    document.getElementById('product-list').innerHTML = '<div style="color:#e05050;font-size:13px;text-align:center;padding:20px;">Failed to load. Check GitHub token.</div>';
  });
}

var CAT_STYLES = {
  'slab-stand': { label: 'Slab Stand', bg: '#1a1a2e', color: '#a0a0d4' },
  'magnet': { label: 'Magnet', bg: '#2e1a0a', color: '#d4a060' },
  'accessory': { label: 'Accessory', bg: '#1a1a1a', color: '#909090' }
};
function catStyle(c) { return CAT_STYLES[c] || { label: c, bg: '#222', color: '#aaa' }; }

function renderProductList() {
  if (!products.length) {
    document.getElementById('product-list').innerHTML = '<div style="color:#666;font-size:13px;text-align:center;padding:20px;">No products yet. Add one!</div>';
    return;
  }
  document.getElementById('product-list').innerHTML = products.map(function(p) {
    var cs = catStyle(p.category);
    var thumb = p.photo
      ? '<img src="' + p.photo + '" style="width:52px;height:52px;border-radius:8px;object-fit:cover;">'
      : '<div style="width:52px;height:52px;border-radius:8px;background:#222;display:flex;align-items:center;justify-content:center;color:#555;font-size:10px;text-align:center;">' + cs.label + '</div>';
    return '<div class="product-item">'
      + thumb
      + '<div class="product-info">'
      + '<div class="product-name">' + p.name + '</div>'
      + '<div class="product-meta">$' + p.price + ' &middot; <span class="cat-badge" style="background:' + cs.bg + ';color:' + cs.color + '">' + cs.label + '</span></div>'
      + '</div>'
      + '<div class="product-actions">'
      + '<button class="edit-btn" onclick="openForm(\'' + p.slug + '\')">Edit</button>'
      + '<button class="del-btn" onclick="deleteProduct(\'' + p.slug + '\')">Del</button>'
      + '</div></div>';
  }).join('');
}

// Form
function openForm(slug) {
  editingSlug = slug;
  uploadedPhotoUrl = '';
  document.getElementById('form-title').textContent = slug ? 'Edit Product' : 'Add Product';
  document.getElementById('photo-preview').style.display = 'none';
  document.getElementById('photo-upload-area').style.display = 'flex';
  document.getElementById('photo-status').textContent = '';
  document.getElementById('photo-status').className = 'photo-status';
  document.getElementById('status-bar').className = 'status-bar';
  document.getElementById('photo-input').value = '';

  if (slug) {
    var p = products.find(function(x) { return x.slug === slug; });
    if (p) {
      document.getElementById('f-name').value = p.name;
      document.getElementById('f-slug').value = p.slug;
      document.getElementById('f-category').value = p.category;
      document.getElementById('f-price').value = p.price;
      document.getElementById('f-desc').value = p.description;
      uploadedPhotoUrl = p.photo || '';
      if (p.photo) {
        document.getElementById('photo-preview').src = p.photo;
        document.getElementById('photo-preview').style.display = 'block';
        document.getElementById('photo-upload-area').style.display = 'none';
        document.getElementById('photo-status').textContent = 'Current photo loaded';
        document.getElementById('photo-status').className = 'photo-status done';
      }
    }
  } else {
    document.getElementById('f-name').value = '';
    document.getElementById('f-slug').value = '';
    document.getElementById('f-category').value = 'slab-stand';
    document.getElementById('f-price').value = '';
    document.getElementById('f-desc').value = '';
  }
  showScreen('form');
}

function closeForm() { showScreen('main'); }

// Auto-generate slug from name
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('f-name').addEventListener('input', function() {
    if (!editingSlug) {
      document.getElementById('f-slug').value = this.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }
  });
});

// Photo handling
function handlePhotoSelect(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('photo-preview').src = e.target.result;
    document.getElementById('photo-preview').style.display = 'block';
    document.getElementById('photo-upload-area').style.display = 'none';
    document.getElementById('photo-status').textContent = 'Uploading...';
    document.getElementById('photo-status').className = 'photo-status uploading';
    uploadToFirebase(file);
  };
  reader.readAsDataURL(file);
}

function uploadToFirebase(file) {
  var slug = document.getElementById('f-slug').value.trim() || ('product-' + Date.now());
  var ext = file.name.split('.').pop();
  var path = 'product-photos/custom/' + slug + '.' + ext;
  var url = 'https://firebasestorage.googleapis.com/v0/b/' + FIREBASE_STORAGE_BUCKET + '/o/' + encodeURIComponent(path) + '?uploadType=media&key=' + FIREBASE_API_KEY;

  var xhr = new XMLHttpRequest();
  xhr.open('POST', url, true);
  xhr.setRequestHeader('Content-Type', file.type);
  xhr.onload = function() {
    if (xhr.status === 200) {
      var resp = JSON.parse(xhr.responseText);
      uploadedPhotoUrl = 'https://storage.googleapis.com/' + FIREBASE_STORAGE_BUCKET + '/' + path;
      document.getElementById('photo-status').textContent = '✓ Photo uploaded';
      document.getElementById('photo-status').className = 'photo-status done';
    } else {
      document.getElementById('photo-status').textContent = 'Upload failed: ' + xhr.status;
      document.getElementById('photo-status').className = 'photo-status err';
    }
  };
  xhr.onerror = function() {
    document.getElementById('photo-status').textContent = 'Upload failed (network error)';
    document.getElementById('photo-status').className = 'photo-status err';
  };
  xhr.send(file);
}

// Save product to GitHub
function saveProduct() {
  var name = document.getElementById('f-name').value.trim();
  var slug = document.getElementById('f-slug').value.trim();
  var category = document.getElementById('f-category').value;
  var price = parseFloat(document.getElementById('f-price').value);
  var desc = document.getElementById('f-desc').value.trim();

  if (!name || !slug || !price) {
    showStatus('Name, slug and price are required.', true);
    return;
  }

  var product = { slug: slug, name: name, category: category, price: price, description: desc, photo: uploadedPhotoUrl };

  if (editingSlug) {
    var idx = products.findIndex(function(p) { return p.slug === editingSlug; });
    if (idx >= 0) products[idx] = product; else products.push(product);
  } else {
    if (products.find(function(p) { return p.slug === slug; })) {
      showStatus('A product with this slug already exists.', true);
      return;
    }
    products.push(product);
  }

  commitToGitHub();
}

function deleteProduct(slug) {
  if (!confirm('Delete "' + slug + '"?')) return;
  products = products.filter(function(p) { return p.slug !== slug; });
  commitToGitHub(true);
}

function commitToGitHub(isDelete) {
  var btn = document.getElementById('submit-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }

  var content = btoa(unescape(encodeURIComponent(JSON.stringify(products, null, 2))));
  var body = JSON.stringify({
    message: (isDelete ? 'Delete' : (editingSlug ? 'Update' : 'Add')) + ' custom product via BPP Admin',
    content: content,
    sha: currentFileSHA,
    branch: GITHUB_BRANCH
  });

  fetch('https://api.github.com/repos/' + GITHUB_OWNER + '/' + GITHUB_REPO + '/contents/' + GITHUB_FILE, {
    method: 'PUT',
    headers: {
      'Authorization': 'token ' + GITHUB_TOKEN,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: body
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.content) {
      currentFileSHA = data.content.sha;
      if (isDelete) {
        renderProductList();
        showScreen('main');
      } else {
        showStatus('✓ Saved! Live on shop in ~60 seconds.', false);
        setTimeout(function() { closeForm(); loadProducts(); }, 1500);
      }
    } else {
      showStatus('GitHub error: ' + JSON.stringify(data.message), true);
    }
  })
  .catch(function(e) {
    showStatus('Save failed: ' + e.message, true);
  })
  .finally(function() {
    if (btn) { btn.disabled = false; btn.textContent = 'Save Product'; }
  });
}

function showStatus(msg, isErr) {
  var el = document.getElementById('status-bar');
  el.textContent = msg;
  el.className = 'status-bar show' + (isErr ? ' err' : '');
}
</script>
</body>
</html>
